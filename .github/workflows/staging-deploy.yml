name: Staging Deployment

on:
  push:
    branches:
      - main
      - feat/production-hardening-phase-9

permissions:
  contents: read
  packages: write

concurrency:
  group: staging-deploy
  cancel-in-progress: false

jobs:
  validate-and-test:
    name: Validate and Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 11.12.0
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Static Verification
        run: pnpm typecheck

      - name: Run Unit Tests
        run: pnpm test

      - name: Run Build
        run: pnpm build

  build-container:
    name: Build Container & Security Scan
    runs-on: ubuntu-latest
    needs: validate-and-test
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Container Image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: e2b-agent-runtime-controller:staging
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify Non-Root User
        run: |
          USER_ID=$(docker run --rm e2b-agent-runtime-controller:staging id -u)
          if [ "$USER_ID" = "0" ]; then
            echo "Security Error: Container is running as root!"
            exit 1
          fi
          echo "Success: Container runs as user ID $USER_ID"

  deploy-staging:
    name: Deploy to Staging Environment
    runs-on: ubuntu-latest
    needs: build-container
    environment: staging
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Staging Deploy Check
        run: |
          if [ -z "${{ secrets.STAGING_DEPLOY_CREDENTIALS }}" ]; then
            echo "Staging credentials are not available. Marking staging deployment as NOT executed."
            echo "Staging Deployment: SKIPPED"
          else
            echo "Deploying to Google Cloud Run staging environment..."
            # Actual deployment steps would go here
          fi
