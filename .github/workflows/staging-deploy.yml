name: Staging Deployment

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

concurrency:
  group: staging-deploy-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate-and-test:
    name: Validate and Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run repository checks
        run: pnpm check

  build-container:
    name: Build Container and Verify Runtime User
    runs-on: ubuntu-latest
    needs: validate-and-test
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Container Image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: e2b-agent-runtime-controller:staging
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify Non-Root User
        run: |
          USER_ID=$(docker run --rm e2b-agent-runtime-controller:staging id -u)
          if [ "$USER_ID" = "0" ]; then
            echo "Security Error: Container is running as root"
            exit 1
          fi
          echo "Container runs as non-root user ID $USER_ID"

  deploy-staging:
    name: Deploy to Staging Environment
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: build-container
    environment: staging
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Staging Deploy Check
        run: |
          if [ -z "${{ secrets.STAGING_DEPLOY_CREDENTIALS }}" ]; then
            echo "Staging credentials are not available. Deployment was not executed."
          else
            echo "Staging credentials detected. Run the configured Cloud Run deployment command here."
          fi
