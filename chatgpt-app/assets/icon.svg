<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background Shield -->
  <rect x="10" y="10" width="80" height="80" rx="16" fill="url(#grad1)" stroke="#334155" stroke-width="4" />
  <!-- Sandbox Inner box -->
  <path d="M 30,35 L 50,25 L 70,35 L 70,55 L 50,65 L 30,55 Z" fill="none" stroke="url(#grad2)" stroke-width="3" stroke-linejoin="round" />
  <!-- MicroVM Core -->
  <circle cx="50" cy="45" r="8" fill="#38bdf8" />
  <!-- Security Connection Dots -->
  <line x1="50" y1="25" x2="50" y2="35" stroke="#334155" stroke-width="2" />
  <line x1="30" y1="55" x2="50" y2="45" stroke="#334155" stroke-width="2" />
  <line x1="70" y1="55" x2="50" y2="45" stroke="#334155" stroke-width="2" />
</svg>
